<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Зере</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comfortaa', cursive;
            background-color: #fff9d6;
            transition: background-color 2s ease;
        }

        /* Идеально ровное сердце через псевдоэлементы */
        .heart-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .heart-container:hover {
            transform: scale(1.1);
        }

        .big-heart {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ff4d6d;
            transform: rotate(-45deg);
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            animation: pulse 2s infinite;
        }

        .big-heart::before,
        .big-heart::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ff4d6d;
            border-radius: 50%;
        }

        .big-heart::before { top: -50%; left: 0; }
        .big-heart::after { left: 50%; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.05); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        /* Доработанный конверт */
        .envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 80px;
            background: #fffdf0;
            border-radius: 5px;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Линии конверта */
        .envelope-fold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid #f0d890;
            clip-path: polygon(0% 0%, 50% 65%, 100% 0%);
            background: #faf7e6;
            z-index: 22;
        }

        .envelope-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -10%);
            font-size: 20px;
            z-index: 23;
        }

        /* Текст сообщения */
        #text-container {
            display: none;
            position: absolute;
            width: 85vw;
            max-width: 600px;
            color: #d63384;
            font-size: 24px;
            line-height: 1.6;
            text-align: center;
            z-index: 30;
            padding: 20px;
        }

        /* Дождь */
        .particle {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        body.active-bg { background-color: #ffdae9; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="openLetter()">
        <div class="heart-container">
            <div class="big-heart"></div>
            <div class="envelope">
                <div class="envelope-fold"></div>
                <div class="envelope-seal">❤️</div>
            </div>
        </div>
    </div>

    <div id="text-container"></div>

    <script>
        const messageText = "Привет, Зере... Иногда люди появляются в жизни совершенно случайно, но остаются в сердце надолго. Ты стала для меня именно таким человеком. Твоя улыбка, твой голос, даже твои простые слова — всё это почему-то греет меня изнутри. С тобой хочется говорить дольше, смеяться чаще и просто быть рядом, даже в тишине. Я не знаю, как правильно объяснить это чувство, но знаю точно — ты для меня особенная. Береги себя, ладно? И не забывай, что есть человек, который искренне желает тебе счастья. ❤️";

        // Запуск дождя сразу
        setInterval(createRain, 120);

        function openLetter() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.body.classList.add('active-bg');
                
                const container = document.getElementById('text-container');
                container.style.display = 'block';
                typeText(container, messageText, 0);
            }, 800);
        }

        function typeText(element, text, i) {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeText(element, text, i + 1), 60);
            }
        }

        function createRain() {
            const symbols = ['🌸', '❤️', '💕', '🌷', '✨'];
            const p = document.createElement('div');
            p.classList.add('particle');
            p.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = Math.random() * 20 + 15 + 'px';
            p.style.animationDuration = Math.random() * 2 + 3 + 's';
            p.style.opacity = Math.random() * 0.7 + 0.3;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
    </script>
</body>
</html>
